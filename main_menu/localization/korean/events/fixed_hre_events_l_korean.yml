l_korean:
 hre.101.a: "우리는 황제와 미래의 황제들에게 충성을 맹세하고, 제국 구조하의 신하가 될 것입니다."
 hre.108.title: "특권의 회복"
 hre.108.desc: "[GetUniqueInternationalOrganization('hre').GetName]의 특권 폐지령이 철폐됨에 따라, 제국의 맹약으로 맺어진 결속이 해소되었습니다. 봉토와 봉신은 이전의 지위로 돌아가고, 직접 제국 칙허만으로 묶여 있던 이들은 다시 제국의 독립 구성원으로서 행동할 수 있게 되었습니다."
 hre.108.a: "제후들은 다시 자유로워졌다."

l_korean:
 LEAD_imperial_vassal: "$LIST$은(는) [SUBJECT_TYPE.GetName]입니다"
 AM_imperial_vassal: "$LIST$의 [SUBJECT_TYPE.GetName]."
 LEAD_direct_imperial_vassal: "$LIST$은(는) [SUBJECT_TYPE.GetName]입니다"
 AM_direct_imperial_vassal: "$LIST$의 [SUBJECT_TYPE.GetName]."
 LEAD_imperial_fiefdom: "$LIST$은(는) [SUBJECT_TYPE.GetName]입니다"
 AM_imperial_fiefdom: "$LIST$의 [SUBJECT_TYPE.GetName]."
 imperial_fiefdom: "제국 봉토"
 imperial_fiefdom_desc: "$imperial_fiefdom$은 왕조적 권리 또는 봉건적 하사를 통해 보유하며 [GetUniqueInternationalOrganization('hre').GetName]이 공인한 영토입니다. 이들은 [overlord|e]에게 충성을 바치지만, 그 의무는 제국법에 의해 규율되어 [overlord|e]의 권위에 맞서 세력을 결집하지 못하도록 보장됩니다. 또한 [ShowModifierTypeName('country_cabinet_efficiency')]이 향상됩니다."
 imperial_vassal: "제국 봉신"
 imperial_vassal_desc: "$imperial_vassal$은 [GetUniqueInternationalOrganization('hre').GetName]의 보호에 맹세한 국가입니다. 이들은 [overlord|e]에게 공납을 바치고 군사 원정에 참여하지만, 그 맹약이 제국 구조에 결부되어 있기 때문에 자유 의지를 계산할 때 다른 속국과 군사력을 합산하지 않습니다."
 direct_imperial_vassal: "직속 제국 봉신"
 direct_imperial_vassal_desc: "$direct_imperial_vassal$은 [GetUniqueInternationalOrganization('hre').GetName]의 보호에 맹세한 국가입니다. 이들은 황제에게 공납을 바치고 군사 원정에 참여하지만, 그 맹약이 제국 구조에 결부되어 있기 때문에 자유 의지를 계산할 때 다른 속국과 군사력을 합산하지 않습니다."

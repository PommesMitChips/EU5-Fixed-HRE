l_russian:
 hre.101.a: "Мы принесём клятву верности Императору и будущим императорам, став подданными в рамках имперской структуры."
 hre.108.title: "Привилегии Восстановлены"
 hre.108.desc: "С отменой Отзыва Привилегий [GetUniqueInternationalOrganization('hre').GetName] узы, скреплённые имперской клятвой, оказываются расторгнуты. Лены и вассалы возвращаются к своему прежнему статусу, а те, кто был связан исключительно прямой имперской грамотой, вновь вольны действовать как независимые члены Империи."
 hre.108.a: "Князья снова свободны."
